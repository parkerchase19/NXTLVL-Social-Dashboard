name: Collect social stats

on:
  schedule:
    # 07:10 UTC daily. Deliberately not on the hour: GitHub's scheduler is
    # heavily contended at :00 and delays runs, sometimes by tens of minutes.
    - cron: "10 7 * * *"
  workflow_dispatch: # lets you trigger a run by hand from the Actions tab

# Needed to push the new snapshot back to the repo and publish the page.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_HANDLE: ${{ secrets.YOUTUBE_HANDLE }}
          # Unset until you connect these — collect.py skips them cleanly.
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: python3 collect.py

      - name: Rebuild dashboard
        run: python3 build.py

      - name: Commit new snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json docs/index.html
          # No change (e.g. a re-run on the same day with identical numbers) is a
          # normal outcome, not a failure — don't fail the job over it.
          git diff --staged --quiet || git commit -m "Snapshot $(date -u +%Y-%m-%d)"
          git push

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
